# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

set -g mouse on 
set -g status-bg colour236
set -g status-fg colour2

# kube-tmux plugin
set -g status-right "#(/bin/bash $HOME/.tmux/kube-tmux/kube.tmux 250 colour2 colou3)"
set -g status-right-length 80

set -g @plugin 'tmux-plugins/tpm' # mandatory
set -g @plugin 'jonmosco/kube-tmux'

bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Enable Vi mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi Escape send-keys -X cancel

# Reduce delay when pressing Escape in Vim
set -sg escape-time 0

# Change cursor to block when entering copy mode, beam when exiting
set-hook -g pane-mode-changed \
    'run-shell "[ #{pane_in_mode} -eq 1 ] && printf \"\\033[2 q\" > #{client_tty} || printf \"\\033[6 q\" > #{client_tty}"'

# Setup 'v' to begin selection, just like Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Setup 'y' to yank (copy), just like Vim
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Update the default binding of 'Enter' to use copy-selection-and-cancel
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
